name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # Backend — compile + test (Scala / sbt)
  # ─────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install sbt
        uses: coursier/setup-action@v1
        with:
          apps: sbt

      # Cache the sbt launcher, dependencies, and compiled classes.
      # The cache key includes build.sbt so it invalidates on dependency changes.
      - name: Cache sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.ivy2/cache
            ~/.cache/coursier
          key: sbt-${{ hashFiles('deepstone-backend/build.sbt', 'deepstone-backend/project/*.sbt') }}
          restore-keys: sbt-

      - name: Run tests
        working-directory: deepstone-backend
        run: sbt test

      # Generate a coverage report in XML format for SonarCloud.
      # Requires the sbt-scoverage plugin (added below) — skip if not needed.
      - name: Generate coverage report
        working-directory: deepstone-backend
        run: sbt coverage test coverageReport
        continue-on-error: true  # Don't fail CI if coverage reporting breaks

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: deepstone-backend/target/scala-*/scoverage-report/scoverage.xml
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend — type check (Svelte / TypeScript)
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run check

  # ─────────────────────────────────────────────────────────────────────────
  # SonarCloud — static analysis (runs after both jobs complete)
  # ─────────────────────────────────────────────────────────────────────────
  sonar:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # Only run on push to main, not on every PR (avoids using up free quota)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so SonarCloud can compute blame and new code metrics
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.ivy2/cache
            ~/.cache/coursier
          key: sbt-${{ hashFiles('deepstone-backend/build.sbt', 'deepstone-backend/project/*.sbt') }}
          restore-keys: sbt-

      - name: Download backend coverage report
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: deepstone-backend/target/coverage
        continue-on-error: true

      - name: Run SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # provided automatically by GitHub
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}    # add this in repo Settings → Secrets
