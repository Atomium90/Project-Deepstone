# SonarCloud project configuration
# Documentation: https://docs.sonarcloud.io

sonar.projectKey=Atomium90_Project-Deepstone
sonar.organization=atomium90

sonar.projectName=DeepStone
sonar.projectVersion=1.0

# -- Sources ------------------------------------------------------------------

# Scala backend
sonar.sources=deepstone-backend/src/main/scala
sonar.tests=deepstone-backend/src/test/scala

# Frontend TypeScript/Svelte
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# -- Coverage (Scoverage XML) -------------------------------------------------

# NOTE: the "scala-3.3.7" segment must match scala3Version in deepstone-backend/build.sbt.
# sonar-scanner does not support wildcards here, so bumping the Scala version requires
# updating this path too, or SonarCloud silently reports 0% coverage.
sonar.scala.coverage.reportPaths=deepstone-backend/target/scala-3.3.7/scoverage-report/scoverage.xml

# -- Exclusions ---------------------------------------------------------------

# Ignore generated files, build artifacts, and node_modules
sonar.exclusions=\
  **/target/**,\
  **/node_modules/**,\
  **/.metals/**,\
  **/.bsp/**,\
  frontend/src/lib/engine/protocol.ts

# Test files should not count toward production coverage metrics
sonar.test.exclusions=\
  deepstone-backend/src/test/**,\
  frontend/**/*.test.ts

# -- Language settings --------------------------------------------------------

sonar.sourceEncoding=UTF-8
